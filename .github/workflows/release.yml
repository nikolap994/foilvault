name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run type-check
      - run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../foilvault-${{ github.ref_name }}.zip .

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: foilvault-${{ github.ref_name }}.zip
          generate_release_notes: true
